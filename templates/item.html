<html>
<head>
    <title>{{ item.name }}</title>
</head>
<body>

<h1>{{ item.name }}</h1>
<p>{{ item.description }}</p>
<p>{{ item.price|floatformat:2 }} {{ item.currency|upper }}</p>

<button id="checkout-button">Pay with Checkout</button>
<button id="intent-button">Pay with PaymentIntent</button>

<script src="https://js.stripe.com/v3/"></script>

<script>
    const stripe = Stripe("{{ stripe_public_key }}");

    document.getElementById("checkout-button").onclick = async function () {
        try {
            const response = await fetch("/buy/{{ item.id }}/");
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || "Failed to create checkout session");
            }
            const result = await stripe.redirectToCheckout({sessionId: data.id});
            if (result.error) {
                alert(result.error.message);
            }
        } catch (error) {
            alert(error.message);
        }
    };

    document.getElementById("intent-button").onclick = async function () {
        try {
            const response = await fetch("/intent/{{ item.id }}/");
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || "Failed to create payment intent");
            }
            alert("Client secret: " + data.client_secret);
        } catch (error) {
            alert(error.message);
        }
    };
/*
    Minimal demo page:
    - Checkout flow redirects to hosted Stripe page
    - PaymentIntent endpoint returns client_secret only
*/
</script>

</body>
</html>
